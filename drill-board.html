<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach's Drill Board — Quick Access</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ee;
  --surface: #ffffff;
  --surface2: #f0ece3;
  --surface3: #e8e3d8;
  --ink: #1a1612;
  --ink2: #3d3830;
  --muted: #8c8070;
  --rule: #ddd8cc;
  --orange: #e85d1a;
  --orange-light: #fff2ec;
  --orange-border: #f5c4a8;
  --teal: #0d7a6e;
  --teal-light: #e8f6f4;
  --teal-border: #a8ddd8;
  --blue: #1a4a8c;
  --blue-light: #eaf0fb;
  --blue-border: #b0c8f0;
  --gold: #b88a00;
  --gold-light: #fdf8e8;
  --gold-border: #e8d48a;
  --purple: #6b2d8c;
  --purple-light: #f4eefb;
  --purple-border: #d0b0e8;
  --red: #c0302a;
  --red-light: #fdf0ef;
  --red-border: #f0b8b4;
  --head: 'Bebas Neue', sans-serif;
  --body: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--body);
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--ink);
  color: #f7f4ee;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  border-bottom: 4px solid var(--orange);
  position: sticky;
  top: 0;
  z-index: 200;
}
.header-brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 16px 0;
}
.brand-main {
  font-family: var(--head);
  font-size: 28px;
  letter-spacing: 2px;
  color: #f7f4ee;
  line-height: 1;
}
.brand-sub {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--orange);
  text-transform: uppercase;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.timer-display {
  font-family: var(--head);
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--orange);
  cursor: pointer;
  transition: color 0.2s;
  min-width: 80px;
  text-align: center;
}
.timer-display:hover { color: #ff8050; }
.timer-btn {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 6px 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-family: var(--body);
  transition: all 0.15s;
}
.tbtn-start { background: var(--orange); color: white; }
.tbtn-start:hover { background: #ff6e30; }
.tbtn-stop { background: var(--red); color: white; }
.tbtn-stop:hover { background: #e04040; }
.tbtn-reset { background: var(--surface3); color: var(--ink); }
.tbtn-reset:hover { background: var(--rule); }
.drill-count-badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  padding: 6px 14px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
}

/* ── CONTROL BAR ── */
.control-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--rule);
  padding: 14px 32px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  position: sticky;
  top: 65px;
  z-index: 150;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 340px;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 14px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--rule);
  border-radius: 8px;
  padding: 9px 12px 9px 36px;
  font-family: var(--body);
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--orange); }
.search-input::placeholder { color: var(--muted); }

.filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }

.chip {
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 100px;
  border: 1.5px solid var(--rule);
  background: none;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--body);
  white-space: nowrap;
}
.chip:hover { border-color: var(--ink); color: var(--ink); }
.chip.on { background: var(--ink); color: #f7f4ee; border-color: var(--ink); }
.chip.cat-warm.on { background: var(--orange); border-color: var(--orange); color: white; }
.chip.cat-pass.on { background: var(--teal); border-color: var(--teal); color: white; }
.chip.cat-attack.on { background: var(--red); border-color: var(--red); color: white; }
.chip.cat-team.on { background: var(--blue); border-color: var(--blue); color: white; }
.chip.cat-set.on { background: var(--gold); border-color: var(--gold); color: white; }
.chip.cat-compete.on { background: var(--purple); border-color: var(--purple); color: white; }

.sort-select {
  background: var(--surface2);
  border: 1.5px solid var(--rule);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: var(--body);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  cursor: pointer;
}

/* ── MAIN LAYOUT ── */
.main-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

/* ── SECTION DIVIDERS ── */
.cat-section { margin-bottom: 40px; }
.cat-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--rule);
}
.cat-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.cat-title { font-family: var(--head); font-size: 22px; letter-spacing: 2px; }
.cat-count { font-size: 12px; color: var(--muted); font-weight: 600; margin-left: auto; }

/* ── DRILL GRID ── */
.drill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }

/* ── DRILL CARD ── */
.drill-card {
  background: var(--surface);
  border: 1.5px solid var(--rule);
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  display: flex;
  flex-direction: column;
  cursor: pointer;
}
.drill-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  border-color: var(--ink2);
}
.drill-card.hidden { display: none; }

.card-stripe { height: 4px; flex-shrink: 0; }
.stripe-warm { background: var(--orange); }
.stripe-pass { background: var(--teal); }
.stripe-attack { background: var(--red); }
.stripe-team { background: var(--blue); }
.stripe-set { background: var(--gold); }
.stripe-compete { background: var(--purple); }

.card-body { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-cat-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 100px;
  flex-shrink: 0;
}
.badge-warm { background: var(--orange-light); color: var(--orange); border: 1px solid var(--orange-border); }
.badge-pass { background: var(--teal-light); color: var(--teal); border: 1px solid var(--teal-border); }
.badge-attack { background: var(--red-light); color: var(--red); border: 1px solid var(--red-border); }
.badge-team { background: var(--blue-light); color: var(--blue); border: 1px solid var(--blue-border); }
.badge-set { background: var(--gold-light); color: var(--gold); border: 1px solid var(--gold-border); }
.badge-compete { background: var(--purple-light); color: var(--purple); border: 1px solid var(--purple-border); }

.card-title { font-family: var(--head); font-size: 20px; letter-spacing: 0.5px; line-height: 1.05; margin-top: 4px; }

.card-desc { font-size: 13px; color: var(--ink2); line-height: 1.6; flex: 1; }

.card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.meta-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 6px;
  background: var(--surface2);
  color: var(--muted);
}

.card-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  background: var(--surface2);
}
.btn-video {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 7px 14px;
  border-radius: 7px;
  background: var(--ink);
  color: #f7f4ee;
  text-decoration: none;
  transition: background 0.15s;
  border: none;
  cursor: pointer;
  font-family: var(--body);
}
.btn-video:hover { background: var(--orange); }
.btn-video .play-icon { font-size: 10px; }

.btn-fav {
  font-size: 18px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  transition: transform 0.15s;
  line-height: 1;
}
.btn-fav:hover { transform: scale(1.3); }
.btn-fav.faved { filter: none; }

.btn-timer-set {
  font-size: 11px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 6px;
  background: var(--orange-light);
  color: var(--orange);
  border: 1px solid var(--orange-border);
  cursor: pointer;
  font-family: var(--body);
  transition: all 0.15s;
}
.btn-timer-set:hover { background: var(--orange); color: white; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,22,18,0.7);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border-radius: 16px;
  max-width: 680px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(20px);
  transition: transform 0.25s;
  border: 1.5px solid var(--rule);
  box-shadow: 0 24px 80px rgba(0,0,0,0.25);
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-stripe { height: 6px; border-radius: 16px 16px 0 0; }
.modal-header {
  padding: 24px 28px 16px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.modal-title-wrap { flex: 1; }
.modal-cat { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
.modal-title { font-family: var(--head); font-size: 32px; letter-spacing: 1px; line-height: 1; }
.modal-close {
  font-size: 20px;
  background: var(--surface2);
  border: none;
  border-radius: 8px;
  width: 36px; height: 36px;
  cursor: pointer;
  color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--rule); }
.modal-body { padding: 24px 28px; }

.modal-section { margin-bottom: 20px; }
.modal-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.modal-section-text { font-size: 14px; color: var(--ink2); line-height: 1.7; }

.modal-steps { list-style: none; }
.modal-steps li {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--rule);
  font-size: 14px;
  color: var(--ink2);
  line-height: 1.55;
  align-items: flex-start;
}
.modal-steps li:last-child { border-bottom: none; }
.step-n {
  background: var(--ink);
  color: #f7f4ee;
  font-weight: 700;
  font-size: 11px;
  border-radius: 50%;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.modal-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.modal-tag {
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 100px;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--rule);
}

.modal-scoring {
  background: var(--surface2);
  border-radius: 10px;
  padding: 14px 18px;
}
.scoring-row { font-size: 13px; color: var(--ink2); padding: 5px 0; display: flex; gap: 8px; }
.scoring-row::before { content: '🏆'; flex-shrink: 0; }

.modal-footer {
  padding: 16px 28px 24px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.btn-modal-video {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 700;
  padding: 12px 24px;
  border-radius: 9px;
  background: var(--ink);
  color: #f7f4ee;
  text-decoration: none;
  transition: all 0.15s;
  flex: 1;
  justify-content: center;
  border: none;
  cursor: pointer;
  font-family: var(--body);
}
.btn-modal-video:hover { background: var(--orange); }
.btn-modal-timer {
  font-family: var(--body);
  font-size: 13px;
  font-weight: 700;
  padding: 12px 20px;
  border-radius: 9px;
  background: var(--orange-light);
  color: var(--orange);
  border: 1.5px solid var(--orange-border);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-modal-timer:hover { background: var(--orange); color: white; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 15px;
  grid-column: 1 / -1;
}
.empty-state .big { font-size: 40px; margin-bottom: 12px; }

/* ── TIMER MODAL ── */
.timer-modal {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--ink);
  color: #f7f4ee;
  border-radius: 14px;
  padding: 20px 24px;
  z-index: 400;
  box-shadow: 0 8px 40px rgba(0,0,0,0.35);
  min-width: 220px;
  transform: translateY(200px);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.timer-modal.visible { transform: translateY(0); }
.tm-label { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: rgba(247,244,238,0.5); text-transform: uppercase; margin-bottom: 6px; }
.tm-drill { font-size: 14px; font-weight: 600; color: var(--orange); margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tm-time { font-family: var(--head); font-size: 52px; letter-spacing: 4px; color: #f7f4ee; text-align: center; line-height: 1; margin-bottom: 14px; }
.tm-time.running { color: var(--orange); }
.tm-time.done { color: #4caf50; }
.tm-btns { display: flex; gap: 8px; }
.tm-btn {
  flex: 1;
  font-family: var(--body);
  font-size: 12px;
  font-weight: 700;
  padding: 8px;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}
.tm-start { background: var(--orange); color: white; }
.tm-start:hover { background: #ff6e30; }
.tm-stop { background: var(--red); color: white; }
.tm-stop:hover { background: #e04040; }
.tm-reset { background: var(--surface3); color: var(--ink); }
.tm-reset:hover { background: var(--rule); }
.tm-close { background: rgba(255,255,255,0.1); color: #f7f4ee; }
.tm-close:hover { background: rgba(255,255,255,0.2); }

/* ── RESULTS BAR ── */
.results-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--rule);
  padding: 10px 32px;
  font-size: 13px;
  color: var(--muted);
  font-weight: 600;
  display: none;
}
.results-bar.show { display: block; }

/* ── FAV SECTION ── */
.fav-banner {
  background: var(--gold-light);
  border: 1.5px solid var(--gold-border);
  border-radius: 12px;
  padding: 14px 20px;
  margin-bottom: 24px;
  font-size: 13px;
  color: var(--gold);
  font-weight: 600;
  display: none;
}
.fav-banner.show { display: block; }

@media(max-width:600px){
  .site-header { padding: 0 16px; }
  .control-bar { padding: 12px 16px; }
  .main-wrap { padding: 20px 14px; }
  .modal-header, .modal-body, .modal-footer { padding-left: 18px; padding-right: 18px; }
  .brand-main { font-size: 22px; }
  .timer-display { font-size: 22px; }
  .timer-modal { right: 12px; bottom: 12px; left: 12px; min-width: unset; }
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header">
  <div class="header-brand">
    <div class="brand-main">DRILL BOARD</div>
    <div class="brand-sub">Quick Access · 24 Drills</div>
  </div>
  <div class="header-right">
    <div class="drill-count-badge" id="visible-count">24 drills</div>
    <div class="timer-display" id="header-timer" title="Open timer">05:00</div>
    <button class="timer-btn tbtn-start" onclick="timerStart()">▶ START</button>
    <button class="timer-btn tbtn-stop" onclick="timerStop()">■ STOP</button>
    <button class="timer-btn tbtn-reset" onclick="timerReset()">↺</button>
  </div>
</header>

<!-- ── CONTROL BAR ── -->
<div class="control-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="Search drills…" oninput="applyFilters()">
  </div>
  <div class="filter-row">
    <span class="filter-label">Category:</span>
    <button class="chip on" id="chip-all" onclick="setFilter('all',this)">All</button>
    <button class="chip cat-warm" id="chip-warmup" onclick="setFilter('warmup',this)">🔥 Warm-Up</button>
    <button class="chip cat-pass" id="chip-passing" onclick="setFilter('passing',this)">🤲 Passing</button>
    <button class="chip cat-set" id="chip-setting" onclick="setFilter('setting',this)">🎯 Setting</button>
    <button class="chip cat-attack" id="chip-attack" onclick="setFilter('attack',this)">⚡ Attacking</button>
    <button class="chip cat-team" id="chip-team" onclick="setFilter('team',this)">👥 Team</button>
    <button class="chip cat-compete" id="chip-compete" onclick="setFilter('compete',this)">🏆 Compete</button>
    <button class="chip" id="chip-favs" onclick="setFilter('favs',this)">⭐ Favorites</button>
  </div>
  <select class="sort-select" id="sort-select" onchange="applyFilters()">
    <option value="default">Sort: Default</option>
    <option value="az">A → Z</option>
    <option value="time">By Time</option>
    <option value="players">By Players</option>
  </select>
</div>

<div class="results-bar" id="results-bar"></div>

<!-- ── MAIN ── -->
<div class="main-wrap">
  <div class="fav-banner" id="fav-banner">⭐ Showing your favorite drills only.</div>
  <div class="drill-grid" id="drill-grid"></div>
</div>

<!-- ── DRILL MODAL ── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-stripe" id="modal-stripe"></div>
    <div class="modal-header">
      <div class="modal-title-wrap">
        <div class="modal-cat" id="modal-cat"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ── FLOATING TIMER ── -->
<div class="timer-modal" id="timer-modal">
  <div class="tm-label">Practice Timer</div>
  <div class="tm-drill" id="tm-drill-name">—</div>
  <div class="tm-time" id="tm-display">05:00</div>
  <div class="tm-btns">
    <button class="tm-btn tm-start" onclick="timerStart()">▶ GO</button>
    <button class="tm-btn tm-stop" onclick="timerStop()">■ STOP</button>
    <button class="tm-btn tm-reset" onclick="timerReset()">↺ RESET</button>
    <button class="tm-btn tm-close" onclick="hideTimer()">✕</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DRILL DATA — All 24 from Gold Medal Squared
// ══════════════════════════════════════════════
const DRILLS = [
  {
    id: 'nevilles-pepper',

    scoring: ['Standard rally scoring from 24-24', 'Win by 2 to take the set', 'Track who scores the final point most often'],
    emphasis: ['Pressure', 'Mental Toughness', 'Clutch Performance', 'Serving'],
    url: 'https://www.goldmedalsquared.com/volleyball-drills/red-zone',
    timerMin: 12,
  },
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let activeFilter = 'all';
let favorites = JSON.parse(localStorage.getItem('drill_favs') || '[]');
let currentDrill = null;
let timerInterval = null;
let timerSeconds = 300;
let timerRunning = false;
let timerDrillName = '';

const CAT_COLORS = {
  warmup:  { stripe: 'stripe-warm',    badge: 'badge-warm',    dot: 'background:var(--orange)' },
  passing: { stripe: 'stripe-pass',    badge: 'badge-pass',    dot: 'background:var(--teal)' },
  setting: { stripe: 'stripe-set',     badge: 'badge-set',     dot: 'background:var(--gold)' },
  attack:  { stripe: 'stripe-attack',  badge: 'badge-attack',  dot: 'background:var(--red)' },
  team:    { stripe: 'stripe-team',    badge: 'badge-team',    dot: 'background:var(--blue)' },
  compete: { stripe: 'stripe-compete', badge: 'badge-compete', dot: 'background:var(--purple)' },
};

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderDrills(list) {
  const grid = document.getElementById('drill-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><div class="big">🏐</div>No drills match your filter. Try a different category or clear the search.</div>';
    return;
  }
  grid.innerHTML = list.map(d => {
    const cc = CAT_COLORS[d.cat];
    const isFav = favorites.includes(d.id);
    return `<div class="drill-card" id="card-${d.id}" onclick="openModal('${d.id}')">
      <div class="card-stripe ${cc.stripe}"></div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <span class="card-cat-badge ${cc.badge}">${d.catLabel}</span>
            <div class="card-title">${d.emoji} ${d.name}</div>
          </div>
        </div>
        <div class="card-desc">${d.short}</div>
        <div class="card-meta">
          <span class="meta-tag">⏱ ${d.time}</span>
          <span class="meta-tag">👥 ${d.players}</span>
          <span class="meta-tag">${d.level}</span>
        </div>
      </div>
      <div class="card-footer" onclick="event.stopPropagation()">
        <button class="btn-video" onclick="openVideo('${d.url}')">
          <span class="play-icon">▶</span> Watch Video
        </button>
        <button class="btn-timer-set" onclick="setTimer(${d.timerMin},'${d.name.replace(/'/g,"\\'")}')">⏱ ${d.timerMin}m</button>
        <button class="btn-fav ${isFav ? 'faved' : ''}" onclick="toggleFav('${d.id}')" title="${isFav ? 'Remove favorite' : 'Add to favorites'}">${isFav ? '⭐' : '☆'}</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('visible-count').textContent = list.length + ' drill' + (list.length !== 1 ? 's' : '');
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const sort = document.getElementById('sort-select').value;

  let list = [...DRILLS];

  // Category filter
  if (activeFilter === 'favs') {
    list = list.filter(d => favorites.includes(d.id));
  } else if (activeFilter !== 'all') {
    list = list.filter(d => d.cat === activeFilter);
  }

  // Search
  if (q) {
    list = list.filter(d =>
      d.name.toLowerCase().includes(q) ||
      d.short.toLowerCase().includes(q) ||
      d.catLabel.toLowerCase().includes(q) ||
      d.emphasis.some(e => e.toLowerCase().includes(q))
    );
  }

  // Sort
  if (sort === 'az') list.sort((a,b) => a.name.localeCompare(b.name));
  if (sort === 'time') list.sort((a,b) => a.timerMin - b.timerMin);
  if (sort === 'players') list.sort((a,b) => parseInt(a.players) - parseInt(b.players));

  // Results bar
  const rb = document.getElementById('results-bar');
  if (q || activeFilter !== 'all') {
    rb.textContent = `Showing ${list.length} drill${list.length!==1?'s':''} ${q ? `matching "${q}"` : ''} ${activeFilter !== 'all' ? `in ${activeFilter}` : ''}`;
    rb.classList.add('show');
  } else {
    rb.classList.remove('show');
  }

  // Fav banner
  const fb = document.getElementById('fav-banner');
  fb.classList.toggle('show', activeFilter === 'favs');

  renderDrills(list);
}

function setFilter(cat, btnEl) {
  activeFilter = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  btnEl.classList.add('on');
  applyFilters();
}

// ══════════════════════════════════════════════
//  FAVORITES
// ══════════════════════════════════════════════
function toggleFav(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem('drill_favs', JSON.stringify(favorites));
  applyFilters();
}

// ══════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════
function openModal(id) {
  const d = DRILLS.find(x => x.id === id);
  if (!d) return;
  currentDrill = d;
  const cc = CAT_COLORS[d.cat];
  const isFav = favorites.includes(d.id);

  // Stripe color
  const stripeColors = { warmup:'var(--orange)', passing:'var(--teal)', setting:'var(--gold)', attack:'var(--red)', team:'var(--blue)', compete:'var(--purple)' };
  document.getElementById('modal-stripe').style.background = stripeColors[d.cat];
  document.getElementById('modal-cat').textContent = d.catLabel + ' · ' + d.level;
  document.getElementById('modal-title').textContent = d.emoji + ' ' + d.name;

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-label">Goal</div>
      <div class="modal-section-text">${d.goal}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Overview</div>
      <div class="modal-section-text">${d.short}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">How to Run It</div>
      <ul class="modal-steps">
        ${d.howto.map((s,i) => `<li><span class="step-n">${i+1}</span>${s}</li>`).join('')}
      </ul>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Scoring</div>
      <div class="modal-scoring">
        ${d.scoring.map(s => `<div class="scoring-row">${s}</div>`).join('')}
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Emphasis</div>
      <div class="modal-tags">
        ${d.emphasis.map(e => `<span class="modal-tag">${e}</span>`).join('')}
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Drill Info</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <span class="modal-tag">⏱ ${d.time}</span>
        <span class="modal-tag">👥 ${d.players} players</span>
        <span class="modal-tag">📊 ${d.level}</span>
      </div>
    </div>
  `;

  document.getElementById('modal-footer').innerHTML = `
    <button class="btn-modal-video" onclick="openVideo('${d.url}')">▶ Watch Full Video on GMS</button>
    <button class="btn-modal-timer" onclick="setTimer(${d.timerMin},'${d.name.replace(/'/g,"\\'")}');closeModalDirect()">⏱ Set ${d.timerMin}min Timer</button>
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ══════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════
function setTimer(minutes, drillName) {
  timerSeconds = minutes * 60;
  timerDrillName = drillName || '';
  timerRunning = false;
  clearInterval(timerInterval);
  updateTimerDisplay();
  document.getElementById('timer-modal').classList.add('visible');
  document.getElementById('tm-drill-name').textContent = drillName || 'Practice Timer';
  document.getElementById('tm-display').className = 'tm-time';
}

function timerStart() {
  if (timerRunning) return;
  timerRunning = true;
  document.getElementById('tm-display').className = 'tm-time running';
  timerInterval = setInterval(() => {
    if (timerSeconds <= 0) {
      timerStop();
      document.getElementById('tm-display').textContent = 'DONE!';
      document.getElementById('tm-display').className = 'tm-time done';
      document.getElementById('header-timer').textContent = 'DONE';
      // Buzz notification if available
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
      return;
    }
    timerSeconds--;
    updateTimerDisplay();
  }, 1000);
}

function timerStop() {
  timerRunning = false;
  clearInterval(timerInterval);
  if (document.getElementById('tm-display').className !== 'tm-time done') {
    document.getElementById('tm-display').className = 'tm-time';
  }
}

function timerReset() {
  timerStop();
  timerSeconds = 300;
  document.getElementById('tm-display').className = 'tm-time';
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60).toString().padStart(2,'0');
  const s = (timerSeconds % 60).toString().padStart(2,'0');
  const txt = m + ':' + s;
  document.getElementById('tm-display').textContent = txt;
  document.getElementById('header-timer').textContent = txt;
}

function hideTimer() {
  document.getElementById('timer-modal').classList.remove('visible');
}

// ══════════════════════════════════════════════
//  OPEN VIDEO
// ══════════════════════════════════════════════
function openVideo(url) {
  const w = window.open(url, '_blank');
  if (!w || w.closed || typeof w.closed === 'undefined') {
    // Fallback: navigate current tab if popup was blocked
    window.location.href = url;
  }
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  renderDrills(DRILLS);
  updateTimerDisplay();
  // Keyboard close modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });
});
</script>
</body>
</html>
